name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.2.3)"
        required: true
        type: string

permissions:
  id-token: write
  contents: write
  packages: write
  attestations: write

env:
  SVU_VERSION: "3.2.3"

jobs:
  tag:
    name: Determine Version
    runs-on: ubuntu-latest

    outputs:
      VERSION: ${{ steps.tag.outputs.VERSION }}
      PREV_VERSION: ${{ steps.tag.outputs.PREV_VERSION }}
      SAME_VERSION: ${{ steps.tag.outputs.SAME_VERSION }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: get-tags
        run: git fetch --force --tags

      - name: Set version from input or auto-detect
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - use input version
            VERSION="${{ github.event.inputs.version }}"
            # Get previous version for goreleaser
            if command -v git &> /dev/null && git tag --list | grep -q .; then
              PREV_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            else
              PREV_VERSION=""
            fi
            SAME_VERSION=false
            
            # Create and push the tag
            if git rev-parse "$VERSION" >/dev/null 2>&1; then
              echo "Tag $VERSION already exists, skipping tag creation."
            else
              git tag "$VERSION"
              git push --tags
            fi
          else
            # Auto trigger - use svu to determine version
            # Get svu
            URL="https://github.com/caarlos0/svu/releases/download/v${SVU_VERSION}/svu_${SVU_VERSION}_linux_amd64.tar.gz"  
            wget --quiet $URL --output-document svu.tar.gz
            tar -xzf svu.tar.gz
            chmod +x svu
            sudo mv svu /usr/local/bin/
            svu --version

            VERSION=$(svu next --tag.mode all)
            PREV_VERSION=$(svu current --tag.mode all)

            if [ "$VERSION" = "$PREV_VERSION" ]; then
              echo "no new version detected"
              SAME_VERSION=true
            else
              echo "new version detected"
              SAME_VERSION=false

              # Check if the tag already exists before creating it
              if git rev-parse "v$VERSION" >/dev/null 2>&1; then
                echo "Tag v$VERSION already exists, skipping tag creation."
              else
                git tag "$VERSION"
                git push --tags
              fi
            fi
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "SAME_VERSION=$SAME_VERSION" >> $GITHUB_OUTPUT

  goreleaser:
    name: Release
    needs: [tag]
    if: ${{ needs.tag.outputs.SAME_VERSION == 'false' }}
    runs-on: ubuntu-latest
    env:
      GORELEASER_CURRENT_TAG: ${{ needs.tag.outputs.VERSION }}
      GORELEASER_PREVIOUS_TAG: ${{ needs.tag.outputs.PREV_VERSION }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Import Vault Credentials
        id: import-secrets
        uses: ./.github/actions/vault-credentials

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS credentials from AI Research account
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.CI_CD_IAM_ROLE }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
          mask-password: "false"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}

      - name: Generate API Spec
        run: |
          task convert-openapi

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          args: release --clean
          version: "~> v2"
        env:
          GITHUB_TOKEN: ${{ steps.import-secrets.outputs.VAULT_GITHUB_TOKEN }}
