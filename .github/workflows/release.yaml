name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  attestations: write

env:
  SVU_VERSION: "3.2.3"

jobs:
  tag:
    name: Determine Version
    runs-on: ubuntu-latest

    outputs:
      VERSION: ${{ steps.tag.outputs.VERSION }}
      PREV_VERSION: ${{ steps.tag.outputs.PREV_VERSION }}
      SAME_VERSION: ${{ steps.tag.outputs.SAME_VERSION }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: get-tags
        run: git fetch --force --tags

      - name: Get svu
        run: |
          URL="https://github.com/caarlos0/svu/releases/download/v${SVU_VERSION}/svu_linux_amd64.tar.gz"
          wget --quiet $URL --output-document svu.tar.gz
          tar -xzf svu.tar.gz
          chmod +x svu
          sudo mv svu /usr/local/bin/
          svu --version

      - id: tag
        run: |
          VERSION=$(svu next --tag.mode all)
          PREV_VERSION=$(svu current --tag.mode all)

          if [ "$VERSION" = "$PREV_VERSION" ]; then
            echo "no new version detected"
            SAME_VERSION=true
            echo "SAME_VERSION=true" >> $GITHUB_OUTPUT
          else
            echo "new version detected"
            SAME_VERSION=false
            echo "SAME_VERSION=false" >> $GITHUB_OUTPUT

            # Check if the tag already exists before creating it
            if git rev-parse "v$VERSION" >/dev/null 2>&1; then
              echo "Tag v$VERSION already exists, skipping tag creation."
            else
              git tag "$VERSION"
              git push --tags
            fi
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_OUTPUT

  goreleaser:
    name: Release
    needs: [tag]
    if: ${{ needs.tag.outputs.SAME_VERSION == 'false' }}
    runs-on: ubuntu-latest
    env:
      GORELEASER_CURRENT_TAG: ${{ needs.tag.outputs.VERSION }}
      GORELEASER_PREVIOUS_TAG: ${{ needs.tag.outputs.PREV_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get UPX
        run: |
          URL="https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz"
          wget --quiet $URL --output-document upx.tar.xz
          tar -xf upx.tar.xz
          chmod +x upx-${UPX_VERSION}-amd64_linux/upx
          sudo mv upx-${UPX_VERSION}-amd64_linux/upx /usr/local/bin/
          rm -rf upx.tar.xz upx-${UPX_VERSION}-amd64_linux
          upx --version

      - name: Configure AWS credentials from Docs account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CI_CD_IAM_ROLE }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
          mask-password: "false"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          args: release --clean
          version: "~> v2"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
